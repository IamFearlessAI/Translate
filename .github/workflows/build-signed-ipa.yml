name: Build signed IPA

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Upload LocalLensTranslate.ipa to the latest GitHub release"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    env:
      APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
      EXTENSION_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}.ShareExtension
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$TEAM_ID" || (echo "Missing APPLE_TEAM_ID secret" && exit 1)
          test -n "$APP_BUNDLE_ID" || (echo "Missing APP_BUNDLE_ID secret" && exit 1)
          test -n "${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}" || (echo "Missing IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64 secret" && exit 1)
          test -n "$CERTIFICATE_PASSWORD" || (echo "Missing IOS_CERTIFICATE_PASSWORD secret" && exit 1)
          test -n "${{ secrets.IOS_APP_PROVISIONING_PROFILE_BASE64 }}" || (echo "Missing IOS_APP_PROVISIONING_PROFILE_BASE64 secret" && exit 1)
          test -n "${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}" || (echo "Missing IOS_EXTENSION_PROVISIONING_PROFILE_BASE64 secret" && exit 1)

      - name: Install signing assets
        run: |
          mkdir -p "$RUNNER_TEMP/signing" "$HOME/Library/MobileDevice/Provisioning Profiles"

          echo "${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/signing/certificate.p12"
          echo "${{ secrets.IOS_APP_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/signing/app.mobileprovision"
          echo "${{ secrets.IOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/signing/extension.mobileprovision"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import "$RUNNER_TEMP/signing/certificate.p12" -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          APP_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$RUNNER_TEMP/signing/app.mobileprovision")")
          EXT_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$RUNNER_TEMP/signing/extension.mobileprovision")")
          cp "$RUNNER_TEMP/signing/app.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$APP_PROFILE_UUID.mobileprovision"
          cp "$RUNNER_TEMP/signing/extension.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$EXT_PROFILE_UUID.mobileprovision"

          echo "APP_PROFILE_UUID=$APP_PROFILE_UUID" >> "$GITHUB_ENV"
          echo "EXT_PROFILE_UUID=$EXT_PROFILE_UUID" >> "$GITHUB_ENV"

      - name: Create export options
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$APP_BUNDLE_ID</key>
                  <string>$APP_PROFILE_UUID</string>
                  <key>$EXTENSION_BUNDLE_ID</key>
                  <string>$EXT_PROFILE_UUID</string>
              </dict>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
              <key>destination</key>
              <string>export</string>
          </dict>
          </plist>
          EOF

      - name: Archive
        run: |
          xcodebuild \
            -project LocalLensTranslate.xcodeproj \
            -scheme LocalLensTranslate \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/LocalLensTranslate.xcarchive" \
            DEVELOPMENT_TEAM_ID="$TEAM_ID" \
            APP_BUNDLE_ID="$APP_BUNDLE_ID" \
            APP_PROFILE_SPECIFIER="$APP_PROFILE_UUID" \
            EXTENSION_PROFILE_SPECIFIER="$EXT_PROFILE_UUID" \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Export IPA
        run: |
          mkdir -p dist
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/LocalLensTranslate.xcarchive" \
            -exportPath dist \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          IPA_PATH="$(find dist -name '*.ipa' -print -quit)"
          test -n "$IPA_PATH" || (echo "No IPA was exported" && exit 1)
          mv "$IPA_PATH" dist/LocalLensTranslate.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalLensTranslate.ipa
          path: dist/LocalLensTranslate.ipa

      - name: Publish latest release asset
        if: ${{ inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest LocalLens Translate IPA
          body: "Signed IPA built by GitHub Actions."
          files: dist/LocalLensTranslate.ipa
          make_latest: true
